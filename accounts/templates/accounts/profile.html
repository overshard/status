{% extends "base.html" %}


{% block breadcrumbs %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb mb-0">
    <li class="breadcrumb-item"><a href="/">Home</a></li>
    <li class="breadcrumb-item active" aria-current="page">{{ title }}</li>
  </ol>
</nav>
{% endblock %}


{% block main %}
<div class="container my-5">
  <div class="row">
    <div class="col-lg-6 offset-lg-3 col-md-8 offset-md-2">
      <div class="section-label mb-2">operator · {{ request.user.username }}</div>
      <h1 class="fw-bolder text-white" style="letter-spacing: -0.01em;">{{ title }}</h1>
      <p class="text-muted small mb-4">Account identifiers and alert channels. Changes save on submit.</p>

      <form method="POST">
        {% csrf_token %}
        <div class="form-floating mb-3">
          <input type="text" class="form-control {% if form.username.errors %}is-invalid{% endif %}" name="username" id="id_username" placeholder="Username" value="{{ form.username.value }}" />
          <label for="id_username">Username</label>
        </div>
        <div class="form-floating mb-3">
          <input type="email" class="form-control {% if form.email.errors %}is-invalid{% endif %}" name="email" id="id_email" placeholder="Email" value="{{ form.email.value }}" />
          <label for="id_email">Email</label>
        </div>
        <div class="form-floating mb-3">
          <input type="text" class="form-control {% if form.discord_webhook_url.errors %}is-invalid{% endif %}" name="discord_webhook_url" id="id_discord_webhook_url" placeholder="Discord webhook URL" value="{{ form.discord_webhook_url.value|default:'' }}" />
          <label for="id_discord_webhook_url">Discord webhook URL</label>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Save →</button>
          <a href="{% url 'password_change' %}" class="btn btn-outline-light">Change password</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
