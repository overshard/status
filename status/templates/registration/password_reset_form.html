{% extends "base.html" %}


{% block breadcrumbs %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb mb-0">
    <li class="breadcrumb-item"><a href="/">Home</a></li>
    <li class="breadcrumb-item"><a href="{% url 'login' %}">Login</a></li>
    <li class="breadcrumb-item active" aria-current="page">{{ title }}</li>
  </ol>
</nav>
{% endblock %}


{% block main %}
<div class="container my-5">
  <div class="row">
    <div class="col-lg-6 offset-lg-3 col-md-8 offset-md-2">
      <div class="section-label mb-2">recover access</div>
      <h1 class="fw-bolder text-white" style="letter-spacing: -0.01em;">{{ title }}</h1>
      <p class="text-muted small mb-4">Enter your email — we'll dispatch a reset link.</p>

      <form method="POST">
        {% csrf_token %}
        <div class="form-floating mb-3">
          <input type="email" class="form-control {% if form.email.errors %}is-invalid{% endif %}" name="email" id="id_email" placeholder="you@domain" value="{{ form.email.value|default:'' }}" required autofocus />
          <label for="id_email">Email</label>
        </div>
        <button type="submit" class="btn btn-primary">Send reset link →</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
